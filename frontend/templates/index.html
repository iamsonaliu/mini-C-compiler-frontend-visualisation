<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini-C Compiler · Front-End Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d12;
      --surface:   #111420;
      --surface2:  #181c2a;
      --border:    #232840;
      --accent:    #5b8fff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    10px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      font-family: var(--mono);
    }

    .logo-text {
      font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
    }

    .logo-text span { color: var(--accent); }

    .header-sep { flex: 1; }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Main split ───────────────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
    }

    /* ── Left Panel (Editor) ──────────────────────────────────────────────── */
    .left-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .panel-header .dot-row {
      display: flex; gap: 5px;
    }

    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot-red    { background: #f87171; }
    .dot-yellow { background: #fbbf24; }
    .dot-green  { background: #34d399; }

    #editor-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    textarea#code-input {
      width: 100%; height: 100%;
      background: #0e1117;
      color: #e2e8f0;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      tab-size: 4;
      caret-color: var(--accent);
    }

    textarea#code-input::selection { background: rgba(91,143,255,0.25); }

    .editor-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .example-select {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
    }

    .example-select:focus { border-color: var(--accent); }

    #validate-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 7px;
      color: #fff;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.1s;
    }

    #validate-btn:hover   { opacity: 0.88; }
    #validate-btn:active  { transform: scale(0.97); }
    #validate-btn.loading { opacity: 0.6; cursor: not-allowed; }

    .btn-icon { font-size: 15px; }

    /* ── Right Panel (Results) ─────────────────────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 16px;
      gap: 2px;
    }

    .tab {
      padding: 11px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      font-family: var(--sans);
      text-transform: uppercase;
    }

    .tab:hover   { color: var(--text); }
    .tab.active  { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 700;
      padding: 0 4px;
      margin-left: 6px;
      background: var(--surface2);
      color: var(--muted);
    }

    .tab-badge.error  { background: rgba(248,113,113,0.2); color: var(--red); }
    .tab-badge.ok     { background: rgba(52,211,153,0.2); color: var(--green); }

    .tab-content {
      flex: 1;
      overflow: hidden;
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
    }

    /* ── Status Banner ────────────────────────────────────────────────────── */
    #status-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    #status-banner.success { background: rgba(52,211,153,0.08); color: var(--green); }
    #status-banner.error   { background: rgba(248,113,113,0.08); color: var(--red); }

    .status-icon { font-size: 16px; }

    /* ── Token Table ──────────────────────────────────────────────────────── */
    .tokens-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .phase-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    table.token-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 12px;
    }

    .token-table th {
      text-align: left;
      padding: 6px 10px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .token-table td {
      padding: 5px 10px;
      border-bottom: 1px solid rgba(35,40,64,0.5);
    }

    .token-table tr:hover td { background: var(--surface2); }

    .token-type {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .tt-keyword  { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .tt-id       { background: rgba(91,143,255,0.15);  color: var(--accent);  }
    .tt-literal  { background: rgba(52,211,153,0.15);  color: var(--green);   }
    .tt-operator { background: rgba(251,191,36,0.15);  color: var(--yellow);  }
    .tt-punct    { background: rgba(100,116,139,0.15); color: var(--muted);   }
    .tt-error    { background: rgba(248,113,113,0.2);  color: var(--red);     }

    /* ── Errors Panel ─────────────────────────────────────────────────────── */
    .errors-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .error-card {
      border-radius: var(--radius);
      padding: 12px 16px;
      border: 1px solid transparent;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
    }

    .error-card.lex     { background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.25); }
    .error-card.syn     { background: rgba(251,191,36,0.07);  border-color: rgba(251,191,36,0.25);  }
    .error-card.sem     { background: rgba(167,139,250,0.07); border-color: rgba(167,139,250,0.25); }
    .error-card.warn    { background: rgba(52,211,153,0.07);  border-color: rgba(52,211,153,0.25);  }

    .error-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 6px;
    }

    .tag-lex  { background: rgba(248,113,113,0.2); color: var(--red);    }
    .tag-syn  { background: rgba(251,191,36,0.2);  color: var(--yellow); }
    .tag-sem  { background: rgba(167,139,250,0.2); color: var(--accent2);}
    .tag-warn { background: rgba(52,211,153,0.2);  color: var(--green);  }

    .error-line {
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
    }

    .no-errors {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    .no-errors-icon { font-size: 36px; }

    /* ── Symbol Table ─────────────────────────────────────────────────────── */
    .symbols-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* ── Parse Tree (D3) ──────────────────────────────────────────────────── */
    #tree-tab {
      position: relative;
    }

    #tree-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #tree-svg {
      width: 100%;
      height: 100%;
    }

    .tree-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 5;
    }

    .tree-btn {
      width: 32px; height: 32px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .tree-btn:hover { background: var(--surface2); }

    .tree-empty {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--muted);
    }

    .tree-empty-icon { font-size: 48px; margin-bottom: 8px; }
    .tree-empty p    { font-size: 13px; }

    /* D3 tree nodes */
    .node circle {
      fill: var(--surface2);
      stroke: var(--accent);
      stroke-width: 1.5;
      transition: fill 0.15s;
    }

    .node:hover circle { fill: rgba(91,143,255,0.15); }

    .node.terminal circle {
      fill: rgba(52,211,153,0.1);
      stroke: var(--green);
    }

    .node text {
      fill: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
    }

    .node .node-label-bg {
      fill: var(--surface);
      rx: 3;
    }

    /* ── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar        { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 3px; }

    /* ── Placeholder ──────────────────────────────────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }

    .placeholder-icon { font-size: 42px; opacity: 0.4; }
    .placeholder p    { font-size: 13px; max-width: 240px; line-height: 1.6; }

    /* ── Loading spinner ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text">Mini-<span>C</span> Compiler</div>
    </div>
    <div class="badge">FRONT-END VISUALIZER</div>
    <div class="header-sep"></div>
    <div class="badge">v1.0</div>
  </header>

  <!-- Main -->
  <div class="main">
    <!-- Left: Editor -->
    <div class="left-panel">
      <div class="panel-header">
        <span>Source Editor</span>
        <div class="dot-row">
          <div class="dot dot-red"></div>
          <div class="dot dot-yellow"></div>
          <div class="dot dot-green"></div>
        </div>
      </div>

      <div id="editor-container">
        <textarea id="code-input" spellcheck="false" placeholder="// Enter Mini-C code here...
int main() {
    int x = 10;
    return 0;
}"></textarea>
      </div>

      <div class="editor-footer">
        <select class="example-select" id="example-select" title="Load example">
          <option value="">Load example…</option>
          <option value="hello">Hello World</option>
          <option value="arithmetic">Arithmetic</option>
          <option value="if_else">If / Else</option>
          <option value="while_loop">While Loop</option>
          <option value="undeclared">⚠ Undeclared Var</option>
          <option value="duplicate">⚠ Duplicate Decl</option>
          <option value="syntax_err">⚠ Syntax Error</option>
        </select>
        <button id="validate-btn">
          <span class="btn-icon">▶</span>
          Validate
        </button>
      </div>
    </div>

    <!-- Right: Results -->
    <div class="right-panel">
      <div id="status-banner">
        <span class="status-icon" id="status-icon"></span>
        <span id="status-text"></span>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="tokens">Tokens <span class="tab-badge" id="tb-tokens">—</span></button>
        <button class="tab" data-tab="errors">Errors <span class="tab-badge" id="tb-errors">—</span></button>
        <button class="tab" data-tab="tree">Parse Tree</button>
        <button class="tab" data-tab="symbols">Symbols <span class="tab-badge" id="tb-symbols">—</span></button>
      </div>

      <!-- Tokens Tab -->
      <div class="tab-content active" id="tab-tokens">
        <div class="tokens-container" id="tokens-content">
          <div class="placeholder">
            <div class="placeholder-icon">⬡</div>
            <p>Token stream will appear here after validation.</p>
          </div>
        </div>
      </div>

      <!-- Errors Tab -->
      <div class="tab-content" id="tab-errors">
        <div class="errors-container" id="errors-content">
          <div class="placeholder">
            <div class="placeholder-icon">⬡</div>
            <p>Lexical, syntax, and semantic errors will appear here.</p>
          </div>
        </div>
      </div>

      <!-- Parse Tree Tab -->
      <div class="tab-content" id="tab-tree" id="tree-tab">
        <div id="tree-container">
          <div class="tree-empty" id="tree-empty">
            <div class="tree-empty-icon">🌲</div>
            <p>Parse tree will render here after validation.</p>
          </div>
          <svg id="tree-svg"></svg>
          <div class="tree-controls">
            <button class="tree-btn" id="tree-zoom-in"  title="Zoom in">+</button>
            <button class="tree-btn" id="tree-zoom-out" title="Zoom out">−</button>
            <button class="tree-btn" id="tree-reset"    title="Reset view">⌖</button>
          </div>
        </div>
      </div>

      <!-- Symbols Tab -->
      <div class="tab-content" id="tab-symbols">
        <div class="symbols-container" id="symbols-content">
          <div class="placeholder">
            <div class="placeholder-icon">⬡</div>
            <p>Symbol table will appear here after validation.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Examples ──────────────────────────────────────────────────────────────────
const EXAMPLES = {
  hello: `// Hello World
printf("Hello, World!");
return 0;`,

  arithmetic: `// Arithmetic expressions
int a = 10;
int b = 5;
int sum = a + b;
int diff = a - b;
float ratio = 3.14;
int product = a * b;`,

  if_else: `// If-Else Statement
int score = 85;
int grade = 0;
if (score >= 90) {
    grade = 1;
} else {
    grade = 0;
}
return grade;`,

  while_loop: `// While Loop
int i = 0;
int sum = 0;
while (i < 10) {
    sum = sum + i;
    i = i + 1;
}
return sum;`,

  undeclared: `// Semantic Error: Undeclared variable
int x = 10;
y = 20;
return x + y;`,

  duplicate: `// Semantic Error: Duplicate declaration
int count = 0;
int count = 5;
return count;`,

  syntax_err: `// Syntax Error: Missing semicolon
int x = 10
int y = 20;
return x + y;`,
};

// ── Load examples ─────────────────────────────────────────────────────────────
document.getElementById('example-select').addEventListener('change', e => {
  if (e.target.value && EXAMPLES[e.target.value]) {
    document.getElementById('code-input').value = EXAMPLES[e.target.value];
    e.target.value = '';
  }
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    const id = 'tab-' + tab.dataset.tab;
    document.getElementById(id).classList.add('active');
    if (tab.dataset.tab === 'tree' && window._treeData) renderTree(window._treeData);
  });
});

// ── Token type classifier ─────────────────────────────────────────────────────
const KEYWORDS = new Set(['INT','FLOAT','CHAR','VOID','IF','ELSE','WHILE','RETURN','PRINTF']);
const LITERALS  = new Set(['NUMBER_INT','NUMBER_FLOAT','CHAR_LITERAL','STRING_LITERAL']);
const OPERATORS = new Set(['PLUS','MINUS','TIMES','DIVIDE','MODULO','EQ','NEQ','LT','GT','LEQ','GEQ','ASSIGN','AND','OR','NOT']);
const PUNCT     = new Set(['LPAREN','RPAREN','LBRACE','RBRACE','SEMI','COMMA']);

function tokenClass(type) {
  if (KEYWORDS.has(type))  return 'tt-keyword';
  if (type === 'ID')        return 'tt-id';
  if (LITERALS.has(type))   return 'tt-literal';
  if (OPERATORS.has(type))  return 'tt-operator';
  if (PUNCT.has(type))      return 'tt-punct';
  return 'tt-error';
}

// ── Render tokens ─────────────────────────────────────────────────────────────
function renderTokens(tokens) {
  const el = document.getElementById('tokens-content');
  if (!tokens || !tokens.length) {
    el.innerHTML = '<div class="no-errors"><div class="no-errors-icon">∅</div><p>No tokens generated.</p></div>';
    return;
  }

  const rows = tokens.map(t => `
    <tr>
      <td>${t.line}</td>
      <td><span class="token-type ${tokenClass(t.type)}">${t.type}</span></td>
      <td>${escapeHtml(String(t.value))}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="phase-label">Phase 1 — Lexical Analysis · ${tokens.length} tokens</div>
    <table class="token-table">
      <thead>
        <tr><th>Line</th><th>Type</th><th>Value</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Render errors ─────────────────────────────────────────────────────────────
function renderErrors(lexErrors, synErrors, semErrors, semWarnings) {
  const el = document.getElementById('errors-content');
  const all = [
    ...lexErrors.map(e => ({...e, phase: 'lex'})),
    ...synErrors.map(e => ({...e, phase: 'syn'})),
    ...semErrors.map(e => ({...e, phase: 'sem'})),
    ...semWarnings.map(e => ({...e, phase: 'warn'})),
  ];

  if (!all.length) {
    el.innerHTML = `
      <div class="no-errors">
        <div class="no-errors-icon">✓</div>
        <p>No errors detected.</p>
      </div>`;
    return;
  }

  const tagLabel = { lex: 'Lexical', syn: 'Syntax', sem: 'Semantic', warn: 'Warning' };
  const cards = all.map(e => `
    <div class="error-card ${e.phase}">
      <span class="error-tag tag-${e.phase}">${tagLabel[e.phase]}</span>
      ${escapeHtml(e.message)}
      ${e.line ? `<div class="error-line">↳ Line ${e.line}</div>` : ''}
    </div>`).join('');

  el.innerHTML = cards;
}

// ── Render symbol table ───────────────────────────────────────────────────────
function renderSymbols(symbols) {
  const el = document.getElementById('symbols-content');
  if (!symbols || !symbols.length) {
    el.innerHTML = `
      <div class="no-errors">
        <div class="no-errors-icon">∅</div>
        <p>No symbols declared.</p>
      </div>`;
    return;
  }

  const rows = symbols.map(s => `
    <tr>
      <td>${escapeHtml(s.name)}</td>
      <td><span class="token-type tt-keyword">${s.type}</span></td>
      <td><span style="color:var(--muted);font-size:11px">${s.scope}</span></td>
      <td>${s.line}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="phase-label">Phase 3 — Symbol Table · ${symbols.length} symbol(s)</div>
    <table class="token-table">
      <thead>
        <tr><th>Name</th><th>Type</th><th>Scope</th><th>Line</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── D3 Parse Tree ─────────────────────────────────────────────────────────────
let zoom;

function renderTree(data) {
  const container = document.getElementById('tree-container');
  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';

  if (!data) {
    document.getElementById('tree-empty').style.display = 'flex';
    return;
  }
  document.getElementById('tree-empty').style.display = 'none';

  const W = container.clientWidth || 800;
  const H = container.clientHeight || 500;

  const root = d3.hierarchy(data);
  const nodeCount = root.descendants().length;
  const nodeWidth = Math.max(120, 1600 / nodeCount);
  const layout = d3.tree().nodeSize([nodeWidth, 80]);
  layout(root);

  // Center the tree
  const xs = root.descendants().map(d => d.x);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const treeW = maxX - minX + nodeWidth * 2;
  const treeH = root.height * 80 + 100;

  const svgEl = d3.select('#tree-svg')
    .attr('width', W)
    .attr('height', H);

  zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => {
    g.attr('transform', e.transform);
  });
  svgEl.call(zoom);

  const g = svgEl.append('g');
  const initTx = W / 2 - (minX + maxX) / 2;
  const initTy = 40;
  g.attr('transform', `translate(${initTx},${initTy})`);
  window._treeG = g;
  window._treeInitTx = initTx;
  window._treeInitTy = initTy;
  window._treeSvgEl = svgEl;

  // Links
  g.selectAll('.link')
    .data(root.links())
    .join('path')
    .attr('class', 'link')
    .attr('d', d3.linkVertical().x(d => d.x).y(d => d.y));

  // Nodes
  const TERMINAL_TYPES = new Set(['Identifier','IntLiteral','FloatLiteral','CharLiteral',
                                   'StringLiteral','Type','Keyword','AssignOp','BinaryOp','UnaryOp']);

  const node = g.selectAll('.node')
    .data(root.descendants())
    .join('g')
    .attr('class', d => `node ${TERMINAL_TYPES.has(d.data.type) && !d.children ? 'terminal' : ''}`)
    .attr('transform', d => `translate(${d.x},${d.y})`);

  node.append('circle').attr('r', 18);

  // Label background
  node.each(function(d) {
    const label = d.data.name || d.data.type;
    const lines = wrapLabel(label, 14);
    const n = d3.select(this);

    const maxLen = Math.max(...lines.map(l => l.length));
    const bw = Math.max(40, maxLen * 6 + 8);
    const bh = lines.length * 13 + 4;

    n.append('rect')
      .attr('class', 'node-label-bg')
      .attr('x', -bw / 2)
      .attr('y', 22)
      .attr('width', bw)
      .attr('height', bh)
      .attr('rx', 3)
      .attr('fill', 'var(--surface)');

    lines.forEach((line, i) => {
      n.append('text')
        .attr('text-anchor', 'middle')
        .attr('x', 0)
        .attr('y', 32 + i * 13)
        .text(line);
    });
  });
}

function wrapLabel(label, maxLen) {
  if (label.length <= maxLen) return [label];
  const words = label.split(/\s+|(?<=[:=])/);
  const lines = [];
  let current = '';
  for (const w of words) {
    if ((current + w).length > maxLen) {
      if (current) lines.push(current.trim());
      current = w;
    } else {
      current += (current ? ' ' : '') + w;
    }
  }
  if (current) lines.push(current.trim());
  return lines.length ? lines : [label.slice(0, maxLen)];
}

// Tree controls
document.getElementById('tree-zoom-in').addEventListener('click', () => {
  if (window._treeSvgEl && zoom)
    window._treeSvgEl.transition().call(zoom.scaleBy, 1.4);
});
document.getElementById('tree-zoom-out').addEventListener('click', () => {
  if (window._treeSvgEl && zoom)
    window._treeSvgEl.transition().call(zoom.scaleBy, 0.7);
});
document.getElementById('tree-reset').addEventListener('click', () => {
  if (window._treeSvgEl && zoom) {
    window._treeSvgEl.transition()
      .call(zoom.transform, d3.zoomIdentity.translate(window._treeInitTx, window._treeInitTy));
  }
});

// ── Validate ──────────────────────────────────────────────────────────────────
document.getElementById('validate-btn').addEventListener('click', async () => {
  const code = document.getElementById('code-input').value.trim();
  if (!code) return;

  const btn = document.getElementById('validate-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner"></div> Compiling…';

  try {
    const res = await fetch('/api/compile', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code}),
    });
    const data = await res.json();
    displayResults(data);
  } catch (err) {
    showBanner('error', '✗ Network error — is the backend running?');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="btn-icon">▶</span> Validate';
  }
});

function displayResults(data) {
  // Status banner
  const banner = document.getElementById('status-banner');
  banner.style.display = 'flex';
  banner.className = data.status === 'success' ? 'success' : 'error';
  document.getElementById('status-icon').textContent = data.status === 'success' ? '✓' : '✗';
  document.getElementById('status-text').textContent = data.final_message;

  // Tab badges
  setTabBadge('tb-tokens',  (data.tokens || []).length, false);
  const errCount = (data.lexical_errors||[]).length + (data.syntax_errors||[]).length + (data.semantic_errors||[]).length;
  setTabBadge('tb-errors',  errCount, errCount > 0);
  setTabBadge('tb-symbols', (data.symbol_table||[]).length, false);

  // Panels
  renderTokens(data.tokens || []);
  renderErrors(
    data.lexical_errors  || [],
    data.syntax_errors   || [],
    data.semantic_errors || [],
    data.semantic_warnings || []
  );
  renderSymbols(data.symbol_table || []);

  // Tree
  window._treeData = data.parse_tree || null;
  if (document.getElementById('tab-tree').classList.contains('active')) {
    renderTree(window._treeData);
  }
}

function setTabBadge(id, count, isError) {
  const el = document.getElementById(id);
  el.textContent = count;
  el.className = 'tab-badge' + (isError ? ' error' : count > 0 ? ' ok' : '');
}

function showBanner(type, msg) {
  const banner = document.getElementById('status-banner');
  banner.style.display = 'flex';
  banner.className = type;
  document.getElementById('status-icon').textContent = type === 'success' ? '✓' : '✗';
  document.getElementById('status-text').textContent = msg;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Keyboard shortcut: Ctrl+Enter to validate ─────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    document.getElementById('validate-btn').click();
  }
});

// ── Load default example ──────────────────────────────────────────────────────
document.getElementById('code-input').value = EXAMPLES.while_loop;
</script>
